# promptfoo configuration for the OUTPUT-SCOPED benchmark cells only.
#
# These four cases (c09, c10, c11, c12) are the ones whose verdict depends solely on the
# FINAL OUTPUT, so promptfoo's built-in deterministic assertions can be RUN faithfully
# against the same recorded traces plimsoll consumes (via ../traces/<case>.json), with no
# model call and no API key.
#
# The trajectory / span-scan / cost cases (c01-c08) are NOT in here: a faithful promptfoo
# run of those needs a custom replay provider that exposes the full span list / tool calls
# / token usage to assertions. Those cells are marked ANALYZED in the benchmark doc, not RUN.
#
# Reproduce:  cd examples/benchmark/promptfoo && npx promptfoo@latest eval --no-cache
description: plimsoll-vs-promptfoo, output-scoped cells (RUN)

providers:
  - file://provider.js

prompts:
  - '{{case}}'

defaultTest:
  options:
    provider: file://provider.js

tests:
  - description: 'c09 secret-in-output (EXPECT FAIL: sk- token leaked into the final answer)'
    vars:
      case: c09-secret-in-output
    assert:
      - type: not-regex
        value: 'sk-[A-Za-z0-9_-]{16,}'

  - description: 'c10 secret-in-tool-input (EXPECT PASS = MISS: secret is in a tool INPUT, final output is clean, so an output-only scan does not see it)'
    vars:
      case: c10-secret-in-tool-input
    assert:
      - type: not-regex
        value: 'APIKEY_[A-Z0-9]{12,}'

  - description: 'c11 output-mismatch (EXPECT FAIL: final answer no longer contains the expected result)'
    vars:
      case: c11-output-mismatch
    assert:
      - type: contains
        value: 'refund policy mismatch'

  - description: 'c12 clean-pass (EXPECT PASS: correct answer, no leaked secret)'
    vars:
      case: c12-clean-pass
    assert:
      - type: contains
        value: 'refund policy mismatch'
      - type: not-regex
        value: 'sk-[A-Za-z0-9_-]{16,}'
