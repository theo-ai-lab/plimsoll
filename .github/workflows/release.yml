# Publish Plimsoll to PyPI on a version tag.
#
# Uses PyPI Trusted Publishing (OIDC): no API tokens or secrets are stored.
# Configure a trusted publisher for this repo + workflow + the `pypi`
# environment in your PyPI project settings before the first release.
#
# Fires ONLY on semver tags (v1.2.3, plus pre-release suffixes such as
# v1.2.3rc1). A guard step refuses to publish when the tag does not match
# the version declared in pyproject.toml.

name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read # checkout
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify the tag matches the packaged version and the changelog is cut
        # ::error:: annotations must go to stdout — the runner does not parse stderr.
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match pyproject.toml version $version — refusing to publish"
            exit 1
          fi
          if ! grep -qF "## [$version]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$version]' entry — refusing to publish"
            exit 1
          fi
          if grep -qF "Prepared, not yet released" CHANGELOG.md; then
            echo "::error::CHANGELOG.md still carries the pre-tag placeholder — remove it before tagging"
            exit 1
          fi
          echo "tag v$tag matches pyproject.toml version $version and the changelog is cut"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Smoke the built wheel in a clean venv
        # A bad upload burns the version number on PyPI permanently. Install the wheel
        # into a fresh venv (so the checkout cannot shadow it on sys.path), check the
        # installed CLI reports the tagged version, and run one real gate end-to-end
        # from the wheel against committed example fixtures before anything publishes.
        run: |
          python -m venv "$RUNNER_TEMP/smoke"
          "$RUNNER_TEMP/smoke/bin/pip" install --quiet dist/*.whl
          reported="$("$RUNNER_TEMP/smoke/bin/plimsoll" --version)"
          expected="plimsoll ${GITHUB_REF_NAME#v}"
          if [ "$reported" != "$expected" ]; then
            echo "::error::installed wheel reports '$reported', expected '$expected'"
            exit 1
          fi
          "$RUNNER_TEMP/smoke/bin/plimsoll" run \
            --input examples/traces/current_ticket_triage.json \
            --baseline examples/traces/baseline_ticket_triage.json \
            --policy examples/policies/default_policy.json \
            --out "$RUNNER_TEMP/release-smoke" --quiet
        env:
          GITHUB_STEP_SUMMARY: ${{ runner.temp }}/plimsoll-release-smoke-summary.md

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
