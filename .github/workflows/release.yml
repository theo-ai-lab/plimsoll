# Publish Plimsoll to PyPI on a version tag.
#
# Uses PyPI Trusted Publishing (OIDC): no API tokens or secrets are stored.
# Configure a trusted publisher for this repo + workflow + the `pypi`
# environment in your PyPI project settings before the first release.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
