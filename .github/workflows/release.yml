# Publish Plimsoll to PyPI on a version tag.
#
# Uses PyPI Trusted Publishing (OIDC): no API tokens or secrets are stored.
# Configure a trusted publisher for this repo + workflow + the `pypi`
# environment in your PyPI project settings before the first release.
#
# Fires ONLY on semver tags (v1.2.3, plus pre-release suffixes such as
# v1.2.3rc1). A guard step refuses to publish when the tag does not match
# the version declared in pyproject.toml.

name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read # checkout
      id-token: write # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify the tag matches the packaged version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match pyproject.toml version $version — refusing to publish" >&2
            exit 1
          fi
          echo "tag v$tag matches pyproject.toml version $version"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
