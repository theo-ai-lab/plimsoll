name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev deps
        run: python -m pip install -e ".[dev]"
      - name: Ruff lint
        run: python -m ruff check .
      - name: Ruff format check
        run: python -m ruff format --check .
      - name: Unit tests
        # The tests invoke the CLI on intentional regression fixtures; redirect the
        # auto-generated GitHub step summary to a temporary file so the job summary
        # isn't filled with expected FAIL blocks. The step exit code still gates the build.
        run: python -m unittest discover -s tests
        env:
          GITHUB_STEP_SUMMARY: ${{ runner.temp }}/plimsoll-selftest-summary.md
      - name: compileall
        run: python -m compileall -q plimsoll tests scripts
      - name: Smoke
        run: python scripts/smoke.py
        env:
          GITHUB_STEP_SUMMARY: ${{ runner.temp }}/plimsoll-selftest-summary.md
