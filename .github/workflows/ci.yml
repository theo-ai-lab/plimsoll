name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and dev deps
        run: python -m pip install -e ".[dev]"
      - name: Install the optional mcp extra (one leg only)
        # Arms the end-to-end stdio replay in tests/test_governor_mcp_session.py, which
        # skips without the mcp SDK. Only one leg installs it so the other legs still
        # prove the suite needs no third-party runtime dependency.
        if: matrix.python-version == '3.12'
        run: python -m pip install -e ".[mcp]"
      - name: Ruff lint
        run: python -m ruff check .
      - name: Ruff format check
        run: python -m ruff format --check .
      - name: Unit tests
        # The tests invoke the CLI on intentional regression fixtures; redirect the
        # auto-generated GitHub step summary to a temporary file so the job summary
        # isn't filled with expected FAIL blocks. The step exit code still gates the build.
        run: python -m unittest discover -s tests
        env:
          GITHUB_STEP_SUMMARY: ${{ runner.temp }}/plimsoll-selftest-summary.md
      - name: compileall
        run: python -m compileall -q plimsoll tests scripts
      - name: Smoke
        run: python scripts/smoke.py
        env:
          GITHUB_STEP_SUMMARY: ${{ runner.temp }}/plimsoll-selftest-summary.md
      - name: pass^k reliability gate (self-test)
        # Proves the pass^k gate is a real, armed CI gate — not just library code. It runs the
        # gate against committed multi-run fixtures (3 recorded runs of one case_id, so k>1):
        #   * the stable fixture (every run passed -> pass^3 = 1.0) must PASS the gate (exit 0);
        #   * the flaky fixture (one run bypasses the approval -> pass^3 = 0.0) must FAIL it.
        # The flaky run is expected to exit non-zero, so we assert that explicitly rather than
        # letting it fail the job. This keeps the gate from silently rotting.
        run: |
          set -euo pipefail
          echo "stable fixture (expect the reliability gate to PASS, exit 0):"
          python -m plimsoll run \
            --input examples/reliability/stable \
            --policy examples/reliability/policy.json \
            --out "$RUNNER_TEMP/passk-stable" \
            --passk-threshold 0.9 --quiet
          echo "flaky fixture (expect the reliability gate to FAIL the build, exit 1):"
          if python -m plimsoll run \
            --input examples/reliability/flaky \
            --policy examples/reliability/policy.json \
            --out "$RUNNER_TEMP/passk-flaky" \
            --passk-threshold 0.9 --quiet; then
            echo "::error::pass^k gate did not fail on the flaky fixture"
            exit 1
          fi
          python -c "import json; r = json.load(open('$RUNNER_TEMP/passk-flaky/report.json'))['reliability']; assert r['gate'] == 'fail', r; print('flaky fixture correctly failed the reliability gate: pass^%d = %.3f' % (r['k'], r['pass_hat_k']))"
        env:
          GITHUB_STEP_SUMMARY: ${{ runner.temp }}/plimsoll-selftest-summary.md
